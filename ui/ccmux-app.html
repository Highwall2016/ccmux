<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #0a0a0c; display: flex; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; }
  .stage {
    width: 390px; height: 844px; background: #0d0d0f; border-radius: 44px; overflow: hidden;
    position: relative; box-shadow: 0 40px 120px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.06);
    display: flex; flex-direction: column;
  }
  .status-bar {
    height: 48px; display: flex; align-items: flex-end; padding: 0 28px 8px;
    justify-content: space-between; flex-shrink: 0; background: #0d0d0f;
  }
  .status-time { font-size: 15px; font-weight: 600; color: #fff; letter-spacing: -0.3px; }
  .status-icons { display: flex; gap: 6px; align-items: center; }
  .status-icons svg { width: 16px; height: 16px; fill: #fff; }
  .tweaks-panel {
    position: absolute; bottom: 80px; right: 12px; z-index: 999;
    background: #1a1a1e; border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px; padding: 16px; width: 210px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  }
  .tweaks-title { font-size: 11px; font-weight: 600; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
  .tweak-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .tweak-label { font-size: 12px; color: #aaa; }
  .tweak-toggle { width: 36px; height: 20px; border-radius: 10px; cursor: pointer; transition: background 0.2s; position: relative; flex-shrink: 0; }
  .tweak-toggle-thumb { position: absolute; width: 16px; height: 16px; border-radius: 50%; background: #fff; top: 2px; transition: left 0.2s; }
  /* modal overlay */
  .modal-overlay {
    position: absolute; inset: 0; z-index: 500;
    background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
    display: flex; align-items: flex-end; justify-content: center;
  }
  .modal-sheet {
    background: #16161a; border-radius: 24px 24px 0 0;
    width: 100%; padding: 20px 20px 36px;
    border-top: 1px solid rgba(255,255,255,0.08);
    animation: slideUp 0.25s cubic-bezier(0.32,0.72,0,1);
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-handle { width: 36px; height: 4px; border-radius: 2px; background: #333; margin: 0 auto 20px; }
</style>

function relTime(ts) {
  const d = Date.now() - ts;
  if (d < 60000) return `${Math.floor(d/1000)}s`;
  if (d < 3600000) return `${Math.floor(d/60000)}m`;
  if (d < 86400000) return `${Math.floor(d/3600000)}h`;
  return `${Math.floor(d/86400000)}d`;
}

const AVATAR_COLORS = { bash:'#3ddc84', build:'#61afef', tail:'#e5c07b', vim:'#c678dd', deploy:'#56b6c2', panic:'#e06c75' };
function Avatar({ session, accent, show }) {
  if (!show) return null;
  const bg = AVATAR_COLORS[session.name] || accent;
  return (
    <div style={{ width:46, height:46, borderRadius:14, flexShrink:0, background:bg+'22', border:`1.5px solid ${bg}44`,
      display:'flex', alignItems:'center', justifyContent:'center', fontFamily:'JetBrains Mono',

      {session.name.slice(0,2).toUpperCase()}
      <div style={{ position:'absolute', bottom:-2, right:-2, width:10, height:10, borderRadius:'50%',
        background: session.status==='active' ? accent : (session.exitCode===0 ? '#56b6c2' : '#e06c75'),
        border:'2px solid #0d0d0f' }}/>
    </div>
  );
}

// ─── Swipeable Session Row ────────────────────────────────────────
function SessionRow({ session, onClick, onKill, onRename, onPin, accent, compact, showAvatars }) {
  const isUnread = session.unread > 0;
  const isError = session.exitCode !== null && session.exitCode !== 0;
  const [swipeX, setSwipeX] = useState(0);
  const [confirmed, setConfirmed] = useState(false);
  const startX = useRef(null);
  const longPressTimer = useRef(null);
  const isDragging = useRef(false);
  const KILL_THRESHOLD = -72;

  // touch/mouse handlers for swipe
  const onDragStart = (clientX) => { startX.current = clientX; isDragging.current = false; };
  const onDragMove = (clientX) => {
    if (startX.current == null) return;
    const dx = clientX - startX.current;
    if (Math.abs(dx) > 5) isDragging.current = true;
    if (dx < 0) setSwipeX(Math.max(dx, -90));
    else setSwipeX(Math.min(dx, 0));
  };
  const onDragEnd = () => {
    startX.current = null;
    if (swipeX < KILL_THRESHOLD) setSwipeX(-80);
    else setSwipeX(0);
  };

  // long press
  const onPressStart = (clientX) => {
    onDragStart(clientX);
    longPressTimer.current = setTimeout(() => {
      if (!isDragging.current) onRename(session);
    }, 600);
  };
  const onPressEnd = () => {
    clearTimeout(longPressTimer.current);
    onDragEnd();
  };

  const closeSwipe = () => setSwipeX(0);

  const handleKill = (e) => {
    e.stopPropagation();
    if (!confirmed) { setConfirmed(true); return; }
    onKill(session.id);
  };

  // reset confirm when closed
  useEffect(() => { if (swipeX === 0) setConfirmed(false); }, [swipeX]);

  const killBgColor = confirmed ? '#c0392b' : '#e06c75';

  return (
    <div style={{ position:'relative', overflow:'hidden', borderBottom:'1px solid rgba(255,255,255,0.04)' }}>
      {/* kill action behind */}
      <div style={{
        position:'absolute', right:0, top:0, bottom:0, width:80,
        background: killBgColor, display:'flex', alignItems:'center', justifyContent:'center',
        transition:'background 0.2s',
      }}>
        <div onClick={handleKill} style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:3, cursor:'pointer' }}>
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M3 5h12M7 5V3h4v2M8 8v6M10 8v6M4 5l1 10h8l1-10" stroke="#fff" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
          <span style={{ fontSize:10, color:'#fff', fontWeight:600 }}>{confirmed ? 'Sure?' : 'Kill'}</span>
        </div>
      </div>

      {/* row content */}
      <div
        style={{
          display:'flex', alignItems:'center', gap:12,
          padding: compact ? '10px 20px' : '13px 20px',
          cursor:'pointer', background:'#0d0d0f',
          transform:`translateX(${swipeX}px)`,
          transition: startX.current ? 'none' : 'transform 0.25s cubic-bezier(0.32,0.72,0,1)',
          userSelect:'none', WebkitTapHighlightColor:'transparent',
          position:'relative',
        }}
        onClick={() => { if (Math.abs(swipeX) > 5) { closeSwipe(); return; } onClick(); }}
        onMouseEnter={e => { if (swipeX===0) e.currentTarget.style.background='rgba(255,255,255,0.04)'; }}
        onMouseLeave={e => { e.currentTarget.style.background='#0d0d0f'; }}
        onMouseDown={e => onPressStart(e.clientX)}
        onMouseMove={e => onDragMove(e.clientX)}
        onMouseUp={onPressEnd}
        onTouchStart={e => onPressStart(e.touches[0].clientX)}
        onTouchMove={e => onDragMove(e.touches[0].clientX)}
        onTouchEnd={onPressEnd}
      >
        <Avatar session={session} accent={accent} show={showAvatars} />

        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:3 }}>
            <div style={{ display:'flex', alignItems:'center', gap:6 }}>
              {session.pinned && <IcoPin color={accent} size={10}/>}
              <span style={{
                fontFamily:'JetBrains Mono', fontSize:14,
                fontWeight: isUnread ? 700 : 500,
                color: isUnread ? '#fff' : '#888', letterSpacing:-0.3,
              }}>{session.name}</span>
            </div>
            <div style={{ display:'flex', alignItems:'center', gap:6 }}>
              <span style={{ fontSize:11, color:'#3d3d42' }}>{relTime(session.lastAt)}</span>
              {session.unread > 0 && (
                <div style={{ minWidth:18, height:18, borderRadius:9, padding:'0 5px',
                  background: isError ? '#e06c75' : accent,
                  display:'flex', alignItems:'center', justifyContent:'center',
                  fontSize:10, fontWeight:700, color:'#000' }}>{session.unread}</div>
              )}
            </div>
          </div>
          <div style={{
            fontSize:12, color: isUnread ? '#aaa' : '#444',
            fontFamily:'JetBrains Mono', fontWeight: isUnread ? 500 : 400,
            overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', letterSpacing:-0.2,
          }}>{session.lastOutput}</div>
          {!compact && (
            <div style={{ fontSize:10.5, color:'#353539', marginTop:2, fontFamily:'JetBrains Mono' }}>
              {session.cmd}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── Device Switcher Modal ────────────────────────────────────────
function DeviceSwitcherModal({ devices, currentDevice, sessions, onSelect, onClose, accent }) {
  return (

        {devices.map(dev => {
          const devSessions = sessions.filter(s => s.device === dev.name);
          const active = devSessions.filter(s => s.status==='active').length;
          const unread = devSessions.reduce((sum,s) => sum+s.unread, 0);
          const isCurrent = dev.name === currentDevice;
          return (
            <div key={dev.id} onClick={() => { onSelect(dev.name); onClose(); }}
              style={{
                display:'flex', alignItems:'center', gap:14, padding:'12px 14px',

                {dev.platform === 'macos'

              <div style={{ flex:1 }}>
                <div style={{ fontSize:14, fontWeight:600, color: isCurrent ? '#fff' : '#aaa', letterSpacing:-0.2 }}>{dev.name}</div>
                <div style={{ fontSize:11, color:'#444', marginTop:2, fontFamily:'JetBrains Mono' }}>
                  {dev.online ? `${active} active session${active!==1?'s':''}` : 'offline'}

                {unread > 0 && (

          marginTop:8, textAlign:'center', fontSize:13, color:'#555', cursor:'pointer', padding:'8px',
        }}>Cancel</div>

}

// ─── Session List ─────────────────────────────────────────────────
function SessionList({ sessions, onSelect, onKill, onRename, onPin, tweaks, currentDevice, onOpenDeviceSwitcher, onOpenSettings }) {
  const accent = tweaks.accentColor;
  const filtered = sessions.filter(s => s.device === currentDevice);

  const sorted = [...filtered].sort((a, b) => {
    if (a.pinned !== b.pinned) return a.pinned ? -1 : 1;
    if (b.unread !== a.unread) return b.unread - a.unread;
    return b.lastAt - a.lastAt;
  });

  const active = sorted.filter(s => s.status === 'active');
  const exited = sorted.filter(s => s.status === 'exited');
  const dev = DEVICES.find(d => d.name === currentDevice);

  const SectionLabel = ({label}) => (
    <div style={{ padding:'12px 20px 5px', fontSize:10.5, fontWeight:600, color:'#3a3a3f', textTransform:'uppercase', letterSpacing:1 }}>
      {label}
    </div>
  );

  return (
    <div style={{ flex:1, overflowY:'auto', overflowX:'hidden' }}>
      {/* header */}
      <div style={{ padding:'8px 20px 14px', background:'#0d0d0f', borderBottom:'1px solid rgba(255,255,255,0.06)' }}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
          {/* settings button */}
          <button onClick={onOpenSettings} style={{
            background:'rgba(255,255,255,0.06)', border:'1px solid rgba(255,255,255,0.08)',
            borderRadius:10, width:36, height:36, display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer',
          }}>
            <IcoSettings color='#777' size={17}/>
          </button>

          {/* device name — tap to switch */}
          <div onClick={onOpenDeviceSwitcher} style={{ flex:1, textAlign:'center', cursor:'pointer', userSelect:'none' }}>
            <div style={{ display:'flex', alignItems:'center', justifyContent:'center', gap:6 }}>
              {dev?.platform==='macos' ? <IcoLaptop color={accent} size={14}/> : <IcoServer color={accent} size={14}/>}
              <span style={{ fontSize:17, fontWeight:700, color:'#fff', letterSpacing:-0.4 }}>{currentDevice}</span>
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                <path d="M3 5l3 3 3-3" stroke="#555" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
            </div>
            <div style={{ fontSize:11, color:'#555', marginTop:2, fontFamily:'JetBrains Mono' }}>
              {filtered.filter(s=>s.status==='active').length} active
              {filtered.filter(s=>s.unread>0).length > 0 && ` · ${filtered.filter(s=>s.unread>0).length} unread`}
            </div>
          </div>

          {/* new session */}
          <div style={{
            width:36, height:36, borderRadius:10, background:accent+'22', border:`1px solid ${accent}44`,
            display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer',
          }}>
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M7 2v10M2 7h10" stroke={accent} strokeWidth="2" strokeLinecap="round"/>
            </svg>
          </div>
        </div>
      </div>

      {active.length > 0 && <>
        <SectionLabel label="Active"/>
        {active.map(s => (
          <SessionRow key={s.id} session={s}
            onClick={() => onSelect(s)} onKill={onKill} onRename={onRename} onPin={onPin}
            accent={accent} compact={tweaks.compactList} showAvatars={tweaks.showAvatars}/>
        ))}
      </>}

      {exited.length > 0 && <>
        <SectionLabel label="Ended"/>
        {exited.map(s => (
          <SessionRow key={s.id} session={s}
            onClick={() => onSelect(s)} onKill={onKill} onRename={onRename} onPin={onPin}
            accent={accent} compact={tweaks.compactList} showAvatars={tweaks.showAvatars}/>
        ))}
      </>}

      {sorted.length === 0 && (
        <div style={{ padding:'60px 20px', textAlign:'center' }}>
          <div style={{ fontFamily:'JetBrains Mono', fontSize:12, color:'#333' }}>no sessions</div>
        </div>
      )}
    </div>
  );
}

// ─── Resource Widget ──────────────────────────────────────────────
function ResourceWidget({ session, accent }) {
  const [cpu, setCpu] = useState(session.cpu);
  const [mem, setMem] = useState(session.mem);
  useEffect(() => {
    if (session.status !== 'active') return;
    const iv = setInterval(() => {
      setCpu(c => Math.max(0, Math.min(100, c + (Math.random()-0.5)*12)));
      setMem(m => Math.max(10, Math.min(512, m + (Math.random()-0.5)*8)));
    }, 1200);
    return () => clearInterval(iv);
  }, [session.status]);
  const cpuColor = cpu>80 ? '#e06c75' : cpu>50 ? '#e5c07b' : accent;
  return (
    <div style={{ display:'flex', alignItems:'center', gap:6 }}>
      <div style={{ display:'flex', alignItems:'center', gap:4, background:'rgba(255,255,255,0.05)', borderRadius:8, padding:'4px 8px' }}>
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
          <rect x="2" y="2" width="6" height="6" rx="1" stroke={cpuColor} strokeWidth="1.2"/>
          <rect x="3.5" y="3.5" width="3" height="3" fill={cpuColor} rx="0.4"/>
          <path d="M4 1V0M6 1V0M4 10V9M6 10V9M1 4H0M1 6H0M10 4H9M10 6H9" stroke={cpuColor} strokeWidth="0.8" strokeLinecap="round"/>
        </svg>
        <span style={{ fontFamily:'JetBrains Mono', fontSize:10.5, color:cpuColor, fontWeight:600 }}>{Math.round(cpu)}%</span>
      </div>
      <div style={{ display:'flex', alignItems:'center', gap:4, background:'rgba(255,255,255,0.05)', borderRadius:8, padding:'4px 8px' }}>
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
          <rect x="0.5" y="2.5" width="9" height="5" rx="1" stroke="#61afef" strokeWidth="1.2"/>
          <rect x="2" y="4" width="1.2" height="2" fill="#61afef" rx="0.3"/>
          <rect x="4.4" y="4" width="1.2" height="2" fill="#61afef" rx="0.3"/>
          <rect x="6.8" y="4" width="1.2" height="2" fill="#61afef" rx="0.3"/>
        </svg>
        <span style={{ fontFamily:'JetBrains Mono', fontSize:10.5, color:'#61afef', fontWeight:600 }}>{Math.round(mem)}M</span>
      </div>
    </div>
  );
}

// ─── Terminal View ─────────────────────────────────────────────────
function TerminalView({ session, onBack, tweaks, onPin, onRename }) {
  const accent = tweaks.accentColor;
  const [lines, setLines] = useState(session.lines);
  const [cursor, setCursor] = useState('▊');
  const [input, setInput] = useState('');
  const scrollRef = useRef(null);

  useEffect(() => {
    const iv = setInterval(() => setCursor(c => c === '▊' ? '' : '▊'), 530);
    return () => clearInterval(iv);
  }, []);

  useEffect(() => {
    if (session.status !== 'active') return;
    const pool = [
      { id:'c3', line:{ t:'out', v:`[${new Date().toTimeString().slice(0,8)}] INFO  ws: ping` } },
      { id:'a1', line:{ t:'out', v:`--- PASS: TestBroadcast (0.02s)` } },
      { id:'c3', line:{ t:'err', v:`[${new Date().toTimeString().slice(0,8)}] WARN  relay: retry` } },
    ];
    const iv = setInterval(() => {
      const snip = pool.find(s => s.id === session.id);
      if (snip) setLines(l => [...l, snip.line]);
    }, 2800);
    return () => clearInterval(iv);
  }, [session.id, session.status]);

  useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [lines]);

  const sendInput = () => {
    if (!input.trim()) return;
    setLines(l => [...l, { t:'cmd', v:`$ ${input}` }, { t:'prompt', v:`zsh: command not found: ${input}` }]);
    setInput('');
  };

  const lineColors = { cmd:accent, out:'#cdd6f4', err:'#e06c75', ok:'#3ddc84', prompt:'#666', exit:'#555', statusline:'#282c34' };

  const toolbarBtns = [
    { label:'Tab' }, { label:'Esc' }, { label:'Ctrl' }, { label:'Alt' },
    { label:'Ctrl+C', color:'#e06c75' },
    { label:'←' }, { label:'→' }, { label:'↑' }, { label:'↓' },
    { label:'PgUp' }, { label:'PgDn' },
  ];

  return (
    <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden' }}>
      {/* nav */}
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between',
        padding:'6px 16px 10px', borderBottom:'1px solid rgba(255,255,255,0.07)', background:'#0d0d0f', flexShrink:0 }}>
        <button onClick={onBack} style={{ background:'none', border:'none', cursor:'pointer',
          display:'flex', alignItems:'center', gap:4, color:accent, padding:'4px 0' }}>
          <svg width="8" height="14" viewBox="0 0 8 14" fill="none">
            <path d="M7 1L1 7l6 6" stroke={accent} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
          <span style={{ fontSize:13, fontWeight:500 }}>{session.device.split(' ')[0]}</span>
        </button>

        <div style={{ textAlign:'center' }}>
          <div style={{ fontFamily:'JetBrains Mono', fontSize:13, fontWeight:600, color:'#fff', letterSpacing:-0.3 }}>
            {session.pinned && <span style={{ color:accent, marginRight:4 }}>📌</span>}
            {session.name}
          </div>
          <div style={{ fontSize:10, color:'#444', fontFamily:'JetBrains Mono' }}>{session.cmd}</div>
        </div>

        <ResourceWidget session={session} accent={accent}/>
      </div>

      {/* output */}
      <div ref={scrollRef} style={{ flex:1, overflowY:'auto', overflowX:'hidden', background:'#080809', paddingTop:10, paddingBottom:10 }}>
        {lines.map((line, i) => (
          <div key={i} style={{
            fontFamily:'JetBrains Mono, monospace', fontSize:11.5,
            color: line.t==='statusline' ? '#282c34' : lineColors[line.t]||'#cdd6f4',
            lineHeight:1.7, whiteSpace:'pre', letterSpacing:-0.2,
            background: line.t==='statusline' ? '#abb2bf' : undefined,
            padding: line.t==='statusline' ? '1px 12px' : '0 16px',
          }}>{line.v}</div>
        ))}
        {session.status==='active' && (
          <div style={{ fontFamily:'JetBrains Mono', fontSize:11.5, color:accent, padding:'0 16px', lineHeight:1.7 }}>
            $ {cursor}
          </div>
        )}
      </div>

      {/* special key toolbar */}
      <div style={{ background:'#0a0a0c', borderTop:'1px solid rgba(255,255,255,0.05)', flexShrink:0, overflowX:'auto', overflowY:'hidden' }}>
        <div style={{ display:'flex', padding:'6px 8px', gap:5, width:'max-content', minWidth:'100%' }}>
          {toolbarBtns.map(k => {
            const isArrow = ['←','→','↑','↓'].includes(k.label);
            return (
              <div key={k.label} style={{
                minWidth: k.label.length>3 ? 52 : 38, height:34, borderRadius:8, flexShrink:0,
                display:'flex', alignItems:'center', justifyContent:'center', padding:'0 6px',
                background: k.color ? k.color+'18' : '#1a1a1e',
                border: `1px solid ${k.color ? k.color+'33' : 'rgba(255,255,255,0.06)'}`,
                fontSize: isArrow ? 16 : 11, fontWeight: k.color ? 600 : 500,
                color: k.color || '#888', fontFamily:'JetBrains Mono',
                cursor:'pointer', userSelect:'none', transition:'all 0.1s',
              }}
              onMouseDown={e => { e.currentTarget.style.background=k.color?k.color+'33':'#252529'; e.currentTarget.style.color=k.color||'#fff'; }}
              onMouseUp={e => { e.currentTarget.style.background=k.color?k.color+'18':'#1a1a1e'; e.currentTarget.style.color=k.color||'#888'; }}
              >{k.label}</div>
            );
          })}
        </div>
      </div>

      {/* input */}
      {session.status==='active' && (
        <div style={{ display:'flex', alignItems:'center', gap:8, padding:'8px 12px 10px',
          background:'#0d0d0f', borderTop:'1px solid rgba(255,255,255,0.06)', flexShrink:0 }}>
          <div style={{ flex:1, background:'#161619', border:'1px solid rgba(255,255,255,0.08)',
            borderRadius:10, display:'flex', alignItems:'center', padding:'0 10px' }}>
            <span style={{ fontFamily:'JetBrains Mono', fontSize:12, color:accent, marginRight:6 }}>$</span>
            <input value={input} onChange={e => setInput(e.target.value)}
              onKeyDown={e => { if (e.key==='Enter') sendInput(); }}
              placeholder="type a command…"
              style={{ background:'none', border:'none', outline:'none', fontFamily:'JetBrains Mono',
                fontSize:12, color:'#cdd6f4', flex:1, padding:'7px 0' }}/>
          </div>
          <button onClick={sendInput} style={{ width:34, height:34, borderRadius:9, background:accent+'22',
            border:`1px solid ${accent}55`, display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer' }}>
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
              <path d="M1 12L12 6.5 1 1v4l7.5 1.5L1 8z" fill={accent}/>
            </svg>
          </button>
        </div>
      )}
    </div>
  );
}

// ─── Tweaks Panel ─────────────────────────────────────────────────
function TweaksPanel({ tweaks, setTweaks }) {
  const Toggle = ({ k }) => {
    const on = tweaks[k];
    return (
      <div className="tweak-toggle" style={{ background: on ? tweaks.accentColor : '#333' }}
        onClick={() => setTweaks(t => ({ ...t, [k]: !t[k] }))}>
        <div className="tweak-toggle-thumb" style={{ left: on ? 18 : 2 }}/>
      </div>
    );
  };
  return (
    <div className="tweaks-panel">
      <div className="tweaks-title">Tweaks</div>
      <div className="tweak-row">
        <span className="tweak-label">Accent color</span>
        <div style={{ display:'flex', gap:5 }}>
          {['#3ddc84','#61afef','#c678dd','#e5c07b'].map(c => (
            <div key={c} onClick={() => setTweaks(t => ({ ...t, accentColor:c }))} style={{
              width:18, height:18, borderRadius:'50%', background:c, cursor:'pointer',
              border: tweaks.accentColor===c ? '2px solid #fff' : '2px solid transparent',
            }}/>
          ))}
        </div>
      </div>
      <div className="tweak-row"><span className="tweak-label">Compact list</span><Toggle k="compactList"/></div>
      <div className="tweak-row"><span className="tweak-label">Show avatars</span><Toggle k="showAvatars"/></div>
    </div>
  );
}

// ─── Login View ───────────────────────────────────────────────────
function LoginView({ onLogin }) {
  const [email, setEmail] = React.useState('');
  const [pass, setPass] = React.useState('');
  const inputStyle = {
    width:'100%', background:'#0d0d0f', border:'1px solid rgba(255,255,255,0.1)',
    borderRadius:10, padding:'11px 14px', fontFamily:'Inter,sans-serif',
    fontSize:14, color:'#ccc', outline:'none', boxSizing:'border-box',
  };
  return (
    <div style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center',
      justifyContent:'center', padding:'0 28px', gap:0 }}>
      <img src={APP_ICON} width={80} height={80} style={{ borderRadius:18, marginBottom:18, boxShadow:'0 8px 32px rgba(0,0,0,0.5)' }} alt="ccmux"/>
      <div style={{ fontSize:26, fontWeight:700, color:'#fff', letterSpacing:-0.5, marginBottom:4 }}>ccmux</div>
      <div style={{ fontSize:12, color:'#444', fontFamily:'JetBrains Mono', marginBottom:32 }}>terminal multiplexer</div>
      <div style={{ width:'100%', display:'flex', flexDirection:'column', gap:12 }}>
        <input value={email} onChange={e=>setEmail(e.target.value)} placeholder="Email" type="email"
          style={inputStyle}/>
        <input value={pass} onChange={e=>setPass(e.target.value)} placeholder="Password" type="password"
          style={inputStyle}/>
        <div onClick={onLogin} style={{
          marginTop:4, padding:'13px', textAlign:'center', borderRadius:12,
          background:'#3ddc84', color:'#000', fontSize:14, fontWeight:700, cursor:'pointer',
          letterSpacing:-0.2,
        }}>Sign in</div>
        <div style={{ textAlign:'center', fontSize:13, color:'#555', cursor:'pointer', paddingTop:4 }}>
          Create account
        </div>
      </div>
    </div>
  );
}

// ─── Status Bar ───────────────────────────────────────────────────
function StatusBar() {
  const [time, setTime] = useState('');
  useEffect(() => {
    const upd = () => { const d=new Date(); setTime(`${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`); };
    upd(); const iv=setInterval(upd,30000); return ()=>clearInterval(iv);
  }, []);
  return (
    <div className="status-bar">
      <div className="status-time">{time}</div>
      <div style={{ width:126, height:30, background:'#000', borderRadius:20, position:'absolute', top:8, left:'50%', transform:'translateX(-50%)' }}/>
      <div className="status-icons">
        <svg viewBox="0 0 16 16"><path d="M1 6c0-2.8 2.2-5 5-5h4c2.8 0 5 2.2 5 5v1H1V6z" opacity=".3"/><path d="M1 7h14v2c0 2.8-2.2 5-5 5H6C3.2 14 1 11.8 1 9V7z"/></svg>
        <svg viewBox="0 0 16 16"><path d="M8 2C5 2 2.5 4 2 6.8c-.1.5.3.9.8.9H4c.4 0 .8-.3.9-.7C5.2 5.3 6.5 4 8 4s2.8 1.3 3.1 3c.1.4.5.7.9.7h1.2c.5 0 .9-.4.8-.9C13.5 4 11 2 8 2z" opacity=".3"/><path d="M8 5c-1.2 0-2.2.8-2.6 2H4c.4-2.3 2.3-4 4-4s3.6 1.7 4 4h-1.4C10.2 5.8 9.2 5 8 5z" opacity=".6"/><circle cx="8" cy="10" r="2"/></svg>
        <svg viewBox="0 0 25 12"><rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="#fff" strokeOpacity=".35"/><rect x="2" y="2" width="14" height="8" rx="2" fill="#fff"/><path d="M23 4v4a2 2 0 000-4z" fill="#fff" opacity=".4"/></svg>
      </div>
    </div>
  );
}

// ─── Context Menu (long-press popup) ──────────────────────────────
// We handle rename via modal, pin via callback directly in the row's long press.
// Instead let's do a context menu sheet with options.

// ─── App ──────────────────────────────────────────────────────────
function App() {
  const [loggedIn, setLoggedIn] = useState(false);
  const [sessions, setSessions] = useState(SESSIONS_INIT);
  const [selected, setSelected] = useState(null);
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [showTweaks, setShowTweaks] = useState(false);
  const [currentDevice, setCurrentDevice] = useState('MacBook Pro');
  const [showDeviceSwitcher, setShowDeviceSwitcher] = useState(false);
  const [showSettings, setShowSettings] = useState(false);
  const [renameSession, setRenameSession] = useState(null);
  const [contextSession, setContextSession] = useState(null);

  useEffect(() => {
    const handler = e => {
      if (e.data?.type==='__activate_edit_mode') setShowTweaks(true);
      if (e.data?.type==='__deactivate_edit_mode') setShowTweaks(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type:'__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  useEffect(() => {
    window.parent.postMessage({ type:'__edit_mode_set_keys', edits:tweaks }, '*');
  }, [tweaks]);

  // simulate live output
  useEffect(() => {
    const targets = ['c3','a1'];
    const iv = setInterval(() => {
      const id = targets[Math.floor(Math.random()*targets.length)];
      setSessions(ss => ss.map(s =>
        s.id===id && selected?.id!==id
          ? { ...s, unread:s.unread+1, lastAt:Date.now(),
              lastOutput: id==='c3'
                ? `[${new Date().toTimeString().slice(0,8)}] INFO  hub: broadcast`
                : `ok  backend/internal/api (${(Math.random()*2).toFixed(2)}s)` }
          : s
      ));
    }, 4000);
    return () => clearInterval(iv);
  }, [selected]);

  const selectSession = s => {
    setSessions(ss => ss.map(x => x.id===s.id ? {...x, unread:0} : x));
    setSelected(sessions.find(x => x.id===s.id) || s);
  };

  const killSession = id => setSessions(ss => ss.filter(s => s.id!==id));

  const renameSessionFn = (session, newName) => {
    setSessions(ss => ss.map(s => s.id===session.id ? {...s, name:newName.trim()||s.name} : s));
    setRenameSession(null);
  };

  const pinSession = id => {
    setSessions(ss => ss.map(s => s.id===id ? {...s, pinned:!s.pinned} : s));
  };

  // long press → show context menu sheet
  const handleLongPress = (session) => setContextSession(session);

  // updated selected session ref
  const liveSelected = selected ? sessions.find(s=>s.id===selected.id) || selected : null;

  const accent = tweaks.accentColor;

  return (
    <>
      <StatusBar/>
      {!loggedIn ? (
        <LoginView onLogin={() => setLoggedIn(true)}/>
      ) : liveSelected ? (
        <TerminalView
          session={liveSelected}
          onBack={() => setSelected(null)}
          tweaks={tweaks}
          onPin={() => pinSession(liveSelected.id)}
          onRename={() => setRenameSession(liveSelected)}
        />
      ) : (
        <SessionList
          sessions={sessions}
          onSelect={selectSession}
          onKill={killSession}
          onRename={handleLongPress}
          onPin={pinSession}
          tweaks={tweaks}
          currentDevice={currentDevice}
          onOpenDeviceSwitcher={() => setShowDeviceSwitcher(true)}
          onOpenSettings={() => setShowSettings(true)}
        />
      )}

      {/* Settings modal */}
      {showSettings && (
        <SettingsModal onClose={() => setShowSettings(false)} accent={accent}/>
      )}

      {/* Device switcher modal */}
      {showDeviceSwitcher && (
        <DeviceSwitcherModal
          devices={DEVICES}
          currentDevice={currentDevice}
          sessions={sessions}
          onSelect={setCurrentDevice}
          onClose={() => setShowDeviceSwitcher(false)}
          accent={accent}
        />
      )}

      {/* Rename modal */}
      {renameSession && (
        <RenameModal
          session={renameSession}
          onConfirm={(name) => renameSessionFn(renameSession, name)}
          onClose={() => setRenameSession(null)}
          accent={accent}
        />
      )}

      {/* Context menu (long press) */}
      {contextSession && (
        <div className="modal-overlay" onClick={() => setContextSession(null)}>
          <div className="modal-sheet" onClick={e => e.stopPropagation()}>
            <div className="modal-handle"/>
            <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:16 }}>
              <div style={{ fontFamily:'JetBrains Mono', fontSize:15, fontWeight:700, color:'#fff' }}>
                {contextSession.pinned && '📌 '}{contextSession.name}
              </div>
              <div style={{ fontFamily:'JetBrains Mono', fontSize:11, color:'#555' }}>{contextSession.cmd}</div>
            </div>
            {[
              { icon:'✏️', label:'Rename', action:() => { setRenameSession(contextSession); setContextSession(null); } },
              { icon: contextSession.pinned ? '📌' : '📌', label: contextSession.pinned ? 'Unpin' : 'Pin to top', action:() => { pinSession(contextSession.id); setContextSession(null); }, color: accent },
              { icon:'🗑', label:'Kill session', action:() => { killSession(contextSession.id); setContextSession(null); }, color:'#e06c75' },
            ].map(item => (
              <div key={item.label} onClick={item.action} style={{
                display:'flex', alignItems:'center', gap:14, padding:'13px 14px',
                borderRadius:12, marginBottom:6, cursor:'pointer',
                background:'rgba(255,255,255,0.04)',
                border:'1px solid rgba(255,255,255,0.07)',
              }}>
                <span style={{ fontSize:18 }}>{item.icon}</span>
                <span style={{ fontSize:14, fontWeight:500, color: item.color || '#ccc' }}>{item.label}</span>
              </div>
            ))}
            <div onClick={() => setContextSession(null)} style={{
              marginTop:6, textAlign:'center', fontSize:13, color:'#555', cursor:'pointer', padding:'8px',
            }}>Cancel</div>
          </div>
        </div>
      )}

      {showTweaks && <TweaksPanel tweaks={tweaks} setTweaks={setTweaks}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
